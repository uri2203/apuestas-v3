services:
  - type: web
    name: apuestaspro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: APP_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_DAYS
        value: "7"
      - key: ODDS_API_KEY
        sync: false
      - key: API_FOOTBALL_KEY
        sync: false
      - key: OPENWEATHER_KEY
        sync: false
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: TELEGRAM_WEBHOOK_SECRET
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: DB_PATH
        value: "/var/data/apuestaspro.db"
