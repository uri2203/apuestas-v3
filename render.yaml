services:
  - type: web
    name: apuestaspro
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ODDS_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: apuestaspro-db
    plan: free
    databaseName: apuestaspro
